<!doctype html>

<head>

<body class="home-redesign">

  <main id="content">
    <section class="hero paper-section" id="home">
      <div class="hero-copy">
        <p class="eyebrow">PERSONAL LAB / INDEX</p>
        <h1 class="hero-title">Aleksi Lab</h1>
        <p class="hero-cn">Learning, making, and revision.</p>
        <p class="hero-lede zh-copy">学习、创作与 AI 协作的长期实验室。</p>

      <div class="guide-row-list" data-guide-rows></div>
    </section>

      <p class="section-kicker">Archive Links</p>
      <div class="archive-link-list" data-archive-links></div>
    </section>

  <footer class="site-footer">
    <p>Aleksi Lab</p>
    <p>未完手稿不是粗糙，而是始终保留下一次进入的位置。</p>
