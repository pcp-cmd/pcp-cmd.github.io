name: Apply Aleksi Lab v1.6.9

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-v169.yml'

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply v1.6.9 patch
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/v169.patch.gz.b64 <<'EOF'

EOF
          base64 -d /tmp/v169.patch.gz.b64 | gzip -d > /tmp/v169.patch
          git apply --whitespace=nowarn /tmp/v169.patch
          rm -f .github/workflows/apply-v169.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Apply Aleksi Lab v1.6.9 handoff"
            git push
          fi
