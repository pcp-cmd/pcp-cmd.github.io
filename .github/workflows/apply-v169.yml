name: Apply Aleksi Lab v1.6.9

# second trigger: use the encoded patch stored in the previous workflow commit
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-v169.yml'

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Extract previous patch and apply v1.6.9
        shell: bash
        run: |
          set -euo pipefail

          git show HEAD^:.github/workflows/apply-v169.yml \
            | awk '
              /^H4s/ { capture=1 }
              capture && /^EOF$/ { exit }
              capture { print }
            ' > /tmp/v169.patch.gz.b64

          test -s /tmp/v169.patch.gz.b64
          base64 -d /tmp/v169.patch.gz.b64 | gzip -d > /tmp/v169.patch
          git apply --whitespace=nowarn /tmp/v169.patch

          rm -f .github/workflows/apply-v169.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Apply Aleksi Lab v1.6.9 handoff"
            git push
          fi
