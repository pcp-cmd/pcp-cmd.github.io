<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aleksi Lab / Work Detail</title>
  <meta name="description" content="Work detail page for Aleksi Lab visual artifacts.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23faf9f5'/%3E%3Cpath d='M8 22C12 10 22 8 24 18' fill='none' stroke='%23141413' stroke-width='3' stroke-linecap='round'/%3E%3Ccircle cx='23' cy='18' r='3' fill='%23d97757'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="./styles.css">
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>
  <script defer src="./content.js"></script>
  <script defer src="./works-data.js"></script>
  <script defer src="./work-detail.js"></script>
</head>
<body class="work-detail-page">
  <div class="paper-grain" aria-hidden="true"></div>
  <header class="site-header">
    <a class="brand-mark" href="./index.html#home" aria-label="Aleksi Lab home">
      <span>Aleksi Lab</span>
      <small>作品详情</small>
    </a>
    <nav class="desktop-nav" aria-label="Primary navigation">
      <a href="./chain.html">Chain</a>
      <a href="./math.html">Math Lab</a>
      <a href="./works.html">Works</a>
      <a href="./manuscripts.html">Manuscripts</a>
      <a href="./protocol.html">Protocol</a>
    </nav>
  </header>

  <main id="content" class="work-detail-shell work-detail-layout" data-work-detail>
    <aside class="work-detail-meta" data-reveal>
      <a class="return-link" href="./works.html">返回作品档案</a>
      <dl>
        <dt>类别</dt>
        <dd data-work-category>加载中</dd>
        <dt>状态</dt>
        <dd data-work-status>加载中</dd>
        <dt>格式</dt>
        <dd data-work-format>加载中</dd>
      </dl>
      <a class="text-link" href="./works.html" data-related-work-link>打开相关页面</a>
    </aside>

    <article class="work-detail-main">
      <header class="work-detail-hero" data-reveal>
        <p class="section-kicker">作品档案</p>
        <h1 data-work-title>正在加载作品</h1>
        <p class="work-detail-summary" data-work-summary>来自 Aleksi Lab 视觉档案的一件作品。</p>
        <div class="work-tags" data-work-tags></div>
      </header>

      <figure class="work-detail-figure" data-reveal>
        <img data-work-image src="./content/design/works/ayase-momo-dandadan.jpg" alt="Selected work image">
      </figure>

      <section class="work-detail-section" data-reveal>
        <p class="section-kicker">作品语境</p>
        <h2>作品语境</h2>
        <p data-work-concept></p>
      </section>


      <section class="work-detail-section" data-reveal>
        <p class="section-kicker">内部评估</p>
        <h2>作品评分</h2>
        <div class="work-score-grid" data-work-scores></div>
      </section>

      <section class="work-detail-section" data-reveal data-related-article data-work-article-section hidden>
        <p class="section-kicker">配套文章</p>
        <h2>配套阅读</h2>
        <p data-work-article-title></p>
        <a class="text-link" data-work-article-link href="./manuscripts.html">打开文章 →</a>
      </section>
      <section class="work-detail-section" data-reveal>
        <p class="section-kicker">辅助评审</p>
        <h2>辅助性的视觉与结构评审</h2>
        <div class="review-grid" data-work-review></div>
      </section>

      <section class="work-detail-section" data-reveal>
        <p class="section-kicker">版式判断</p>
        <h2>版式判断</h2>
        <div class="layout-notes-grid" data-work-layout></div>
      </section>

      <section class="work-detail-section" data-reveal>
        <p class="section-kicker">视觉系统</p>
        <h2>视觉系统</h2>
        <div class="work-bullet-list" data-work-visual-system></div>
      </section>

      <section class="work-detail-section" data-reveal>
        <p class="section-kicker">下一轮修订</p>
        <h2>下一轮修订</h2>
        <div class="work-bullet-list" data-work-revision></div>
      </section>
    </article>
  </main>
</body>
</html>
