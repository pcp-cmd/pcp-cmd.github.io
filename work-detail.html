<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aleksi Lab / 作品详情</title>
  <meta name="description" content="Aleksi Lab visual archive detail.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23faf9f5'/%3E%3Cpath d='M8 22C12 10 22 8 24 18' fill='none' stroke='%23141413' stroke-width='3' stroke-linecap='round'/%3E%3Ccircle cx='23' cy='18' r='3' fill='%23d97757'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="./styles.css">
  <script defer src="./content.js"></script>
  <script defer src="./works-data.js"></script>
  <script defer src="./work-detail.js"></script>
</head>
<body class="work-detail-page">
  <div class="paper-grain" aria-hidden="true"></div>
  <header class="site-header">
    <a class="brand-mark" href="./index.html#home" aria-label="Aleksi Lab home">
      <span>Aleksi Lab</span>
      <small>作品详情</small>
    </a>
    <nav class="desktop-nav" aria-label="Primary navigation">
      <a href="./works.html" aria-current="page">Works</a>
      <a href="./math.html">Math Lab</a>
      <a href="./manuscripts.html">Manuscripts</a>
      <a href="./protocol.html">Protocol</a>
      <a href="./atlas.html">Lab Atlas</a>
    </nav>
  </header>

  <main id="content" class="work-detail" data-page data-work-detail>
    <a class="return-link" href="./works.html">返回作品档案</a>

    <section class="work-hero">
      <div class="work-hero__copy">
        <p class="eyebrow">作品详情</p>
        <h1 data-work-title>正在加载作品</h1>
        <p class="work-source" data-work-source>来源待复核</p>
        <p class="work-detail-summary" data-work-summary>来自 Aleksi Lab 视觉档案的一件作品。</p>
        <div class="work-tags" data-work-tags></div>
      </div>
      <figure class="work-hero__figure">
        <img class="work-hero-image" data-work-image src="./content/design/works/ayase-momo-dandadan/hero.webp" alt="Selected work image" decoding="async">
      </figure>
    </section>

    <section class="work-curation">
      <p class="eyebrow">策展说明</p>
      <h2>策展说明</h2>
      <p data-work-curation></p>
    </section>

    <section class="work-scores">
      <p class="eyebrow">内部评估</p>
      <h2>作品评分</h2>
      <div class="work-score-grid" data-work-scores></div>
    </section>

    <section class="work-process">
      <p class="eyebrow">修订过程</p>
      <h2>修订过程</h2>
      <div class="work-process__grid" data-work-process></div>
    </section>

    <section class="work-meta-table">
      <p class="eyebrow">档案信息</p>
      <h2>档案信息</h2>
      <dl data-work-meta-table></dl>
    </section>

    <section class="work-related-article" data-work-article-section hidden>
      <p class="eyebrow">关联手稿</p>
      <h2>延伸阅读</h2>
      <p data-work-article-title></p>
      <a class="text-link" data-work-article-link href="./manuscripts.html">打开阅读</a>
    </section>
  </main>
</body>
</html>
