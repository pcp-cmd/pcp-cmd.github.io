<!doctype html>
<html lang="zh-CN">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aleksi Lab / Article</title>
  <meta name="description" content="Aleksi Lab warm 手稿 article reader with Markdown, KaTeX, glyph header, and revision rail.">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <link rel="stylesheet" href="./styles.css">
  <script defer src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script defer data-lib="DOMPurify" src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script defer src="./content.js"></script>

  <script defer src="./article.js"></script>
</head>
<body class="article-page">
  <div class="paper-grain" aria-hidden="true"></div>
  <header class="site-header article-site-header">
    <a class="brand-mark" href="./index.html#home" aria-label="Aleksi Lab home">
      <span>Aleksi Lab</span>
      <small>未完手稿</small>
    </a>
    <nav class="desktop-nav" aria-label="Primary navigation">
      <a href="./works.html">Works</a>
      <a href="./math.html">Math Lab</a>
      <a href="./manuscripts.html">Manuscripts</a>
      <a href="./protocol.html">Protocol</a>
      <a href="./atlas.html">Lab Atlas</a>
    </nav>
  </header>

  <main id="content" class="article-shell" data-article-shell>
    <aside class="article-meta" data-article-meta>
      <a class="return-link" href="./manuscripts.html">返回未完手稿</a>
      <dl>
        <dt>空间</dt>
        <dd data-meta-room>加载中</dd>
        <dt>状态</dt>
        <dd data-meta-status>修订中</dd>
        <dt>资产</dt>
        <dd data-meta-artifact>手稿</dd>
      </dl>
    </aside>

    <article class="article-manuscript" data-reveal>
      <header class="article-header">
        <div>
          <p class="section-kicker" data-article-room>未完手稿</p>
          <h1 data-article-title>正在加载手稿</h1>
          <p class="article-judgment" data-article-judgment>一篇可以继续修订的知识手稿。</p>
          <div class="article-tags" data-article-tags></div>
        </div>
        <div class="article-glyph" data-article-glyph aria-hidden="true"></div>
      </header>
      <div class="article-body" data-article-body></div>
      <footer class="article-next" data-article-next></footer>
    </article>

    <aside class="article-rail" data-article-rail>
      <section>
        <h2>本页目录</h2>
        <nav class="article-toc" data-article-toc></nav>
      </section>
      <section class="revision-rail" data-revision-rail></section>
    </aside>
  </main>
</body>
</html>
